<header
  class="sticky top-0 bg-slate-900 text-white shadow-md z-50 px-4 py-3 flex items-center justify-between"
>
  <div>
    <span class="text-xs text-sky-400 font-semibold tracking-wider uppercase"
      >app Filadélfia Church</span
    >
    <h1 class="text-lg font-bold">Olá, {{ nomeUsuario().split(' ')[0] }} 👋</h1>
  </div>

  <div class="flex items-center gap-3">
    @if (fotoUsuario()) {
      <img
        [src]="fotoUsuario()"
        class="w-10 h-10 rounded-full object-cover border-2 border-sky-400 shadow-sm"
        alt="Perfil"
        (click)="irParaperfil()"
      />
    } @else {
      <div
        class="w-10 h-10 bg-sky-700 text-white font-bold rounded-full flex items-center justify-center border-2 border-sky-400 shadow-sm text-sm"
        (click)="irParaperfil()"
      >
        {{ nomeUsuario()[0].toUpperCase() }}
      </div>
    }

    <button
      (click)="efetuarLogout()"
      class="w-9 h-9 bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-400 hover:text-red-400 rounded-xl flex items-center justify-center transition-all focus:outline-none border border-slate-700"
      title="Sair do aplicativo"
    >
      <mat-icon class="text-lg">logout</mat-icon>
    </button>
  </div>
</header>
