<footer
  class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-lg z-50 px-4 py-2 flex justify-around items-center max-w-xl mx-auto"
>
  <a
    routerLink="/dashboard/home"
    routerLinkActive="text-sky-600 opacity-100"
    [routerLinkActiveOptions]="{ exact: true }"
    class="flex flex-col items-center gap-0.5 focus:outline-none text-slate-400 opacity-50 transition-opacity"
  >
    <span class="text-xl">🏠</span>
    <span class="text-[10px] font-bold tracking-wide">Início</span>
  </a>

  @if (podeAcessarEscalas()) {
    <a
      routerLink="/dashboard/escala"
      routerLinkActive="text-sky-600 opacity-100"
      class="flex flex-col items-center gap-0.5 focus:outline-none text-slate-400 opacity-50 transition-opacity"
    >
      <span class="text-xl">📅</span>
      <span class="text-[10px] font-bold tracking-wide">Escalas</span>
    </a>
  }

  @if (podeAcessarAvisos()) {
    <a
      routerLink="/dashboard/avisos"
      routerLinkActive="text-sky-600 opacity-100"
      class="flex flex-col items-center gap-0.5 focus:outline-none text-slate-400 opacity-50 transition-opacity"
    >
      <span class="text-xl">📢</span>
      <span class="text-[10px] font-bold tracking-wide">Avisos</span>
    </a>
  }

  <a
    routerLink="/dashboard/perfil"
    routerLinkActive="text-sky-600 opacity-100"
    class="flex flex-col items-center gap-0.5 focus:outline-none text-slate-400 opacity-50 transition-opacity"
  >
    <span class="text-xl">👤</span>
    <span class="text-[10px] font-bold tracking-wide">Perfil</span>
  </a>

  @if (isAdmin()) {
    <a
      routerLink="/dashboard/admin"
      routerLinkActive="text-sky-600 opacity-100"
      class="flex flex-col items-center gap-0.5 focus:outline-none text-slate-400 opacity-50 transition-opacity"
    >
      <span class="text-xl">🛠️</span>
      <span class="text-[10px] font-bold tracking-wide">Membros</span>
    </a>
  }
</footer>
