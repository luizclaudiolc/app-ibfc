<div class="min-h-screen flex items-center justify-center bg-slate-50 px-4 py-8">
  <div class="w-full max-w-md bg-white rounded-3xl shadow-sm border border-slate-100 p-6">
    <div class="text-center mb-6">
      <h3 class="text-2xl font-bold text-slate-800 tracking-tight">Criar Nova Conta</h3>
      <p class="text-slate-500 text-sm mt-0.5">Faça parte da nossa rede interna</p>
    </div>

    @if (mensagemErro() || mensagemSucesso()) {
      <div
        class="mb-5 p-3 text-center text-sm rounded-xl border animate-fade-in"
        [class.bg-red-50]="mensagemErro()"
        [class.text-red-600]="mensagemErro()"
        [class.border-red-100]="mensagemErro()"
        [class.bg-emerald-50]="mensagemSucesso()"
        [class.text-emerald-600]="mensagemSucesso()"
        [class.border-emerald-100]="mensagemSucesso()"
      >
        {{ mensagemErro() || mensagemSucesso() }}
      </div>
    }

    <form
      (ngSubmit)="formCad.valid && submeterCadastro()"
      #formCad="ngForm"
      class="space-y-4"
      novalidate
    >
      <div class="flex flex-col items-center mb-2">
        <div
          class="relative w-24 h-24 bg-slate-100 rounded-full border-4 border-white shadow-sm flex items-center justify-center overflow-hidden group"
        >
          @if (previewFoto()) {
            <img [src]="previewFoto()" class="w-full h-full object-cover" />
          } @else {
            <span class="text-4xl text-slate-300">👤</span>
          }
          <label
            class="absolute inset-0 bg-black/40 text-white flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 cursor-pointer transition-opacity"
          >
            <span class="text-lg">📸</span>
            <span class="text-[10px] font-bold uppercase">Foto</span>
            <input
              type="file"
              class="hidden"
              accept="image/*"
              (change)="aoSelecionarFoto($event)"
              [disabled]="carregando()"
            />
          </label>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div class="space-y-1">
          <label class="block text-[11px] font-bold text-slate-500 uppercase px-1">Nome</label>
          <input
            type="text"
            name="nome"
            #nome="ngModel"
            [(ngModel)]="formCadastro().nome"
            required
            [class.border-red-400]="nome.invalid && (nome.touched || formCad.submitted)"
            class="w-full px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:border-sky-500 focus:bg-white focus:ring-4 focus:ring-sky-500/10 outline-none transition-all"
            placeholder="Nome"
            [disabled]="carregando()"
          />
        </div>
        <div class="space-y-1">
          <label class="block text-[11px] font-bold text-slate-500 uppercase px-1">Sobrenome</label>
          <input
            type="text"
            name="sobrenome"
            #sobrenome="ngModel"
            [(ngModel)]="formCadastro().sobrenome"
            required
            [class.border-red-400]="sobrenome.invalid && (sobrenome.touched || formCad.submitted)"
            class="w-full px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:border-sky-500 focus:bg-white focus:ring-4 focus:ring-sky-500/10 outline-none transition-all"
            placeholder="Sobrenome"
            [disabled]="carregando()"
          />
        </div>
      </div>

      <div class="space-y-1">
        <label class="block text-[11px] font-bold text-slate-500 uppercase px-1">E-mail</label>
        <input
          type="email"
          name="email"
          #email="ngModel"
          [(ngModel)]="formCadastro().email"
          required
          email
          [class.border-red-400]="email.invalid && (email.touched || formCad.submitted)"
          class="w-full px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:border-sky-500 focus:bg-white focus:ring-4 focus:ring-sky-500/10 outline-none transition-all"
          placeholder="exemplo@email.com"
          [disabled]="carregando()"
        />
      </div>

      <div class="grid grid-cols-3 gap-3">
        <div class="col-span-2 space-y-1">
          <label class="block text-[11px] font-bold text-slate-500 uppercase px-1">WhatsApp</label>
          <input
            type="tel"
            name="telefone"
            #telefone="ngModel"
            [(ngModel)]="formCadastro().telefone"
            required
            pattern="[0-9]{10,11}"
            [class.border-red-400]="telefone.invalid && (telefone.touched || formCad.submitted)"
            class="w-full px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:border-sky-500 outline-none transition-all"
            placeholder="24 999999999"
            [disabled]="carregando()"
          />
        </div>
        <div class="space-y-1">
          <label class="block text-[11px] font-bold text-slate-500 uppercase px-1">Cargo</label>
          <select
            name="cargo"
            [ngModel]="formCadastro().cargo"
            (ngModelChange)="atualizarForm('cargo', $event)"
            class="w-full px-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:border-sky-500 outline-none transition-all"
          >
            @for (item of cargosDisponiveis; track item.value) {
              <option [value]="item.value">{{ item.label }}</option>
            }
          </select>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div class="space-y-1">
          <label class="block text-[11px] font-bold text-slate-500 uppercase px-1"
            >Nascimento</label
          >
          <input
            type="date"
            name="dataNascimento"
            [(ngModel)]="formCadastro().dataNascimento"
            required
            class="w-full px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:border-sky-500 outline-none transition-all"
          />
        </div>
        <div class="space-y-1">
          <label class="block text-[11px] font-bold text-slate-500 uppercase px-1">Senha</label>
          <input
            type="password"
            name="senha"
            #senha="ngModel"
            [(ngModel)]="formCadastro().senha"
            required
            minlength="6"
            [class.border-red-400]="senha.invalid && (senha.touched || formCad.submitted)"
            class="w-full px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:border-sky-500 outline-none transition-all"
            placeholder="••••••"
            [disabled]="carregando()"
          />
        </div>
      </div>

      <button
        type="submit"
        [disabled]="carregando() || formCad.invalid"
        class="w-full bg-sky-600 hover:bg-sky-700 text-white font-bold py-3 rounded-xl shadow-sm transition-all disabled:opacity-50 mt-2"
      >
        {{ carregando() ? 'Processando...' : 'Finalizar Cadastro' }}
      </button>
    </form>

    <div class="text-center mt-6 pt-5 border-t border-slate-100">
      <p class="text-sm text-slate-500 font-medium">
        Já tem uma conta?

        <a routerLink="/login" class="text-sky-600 hover:text-sky-700 font-bold transition-colors"
          >Fazer Login</a
        >
      </p>
    </div>
  </div>
</div>
