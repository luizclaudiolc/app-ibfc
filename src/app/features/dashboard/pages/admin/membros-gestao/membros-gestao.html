<app-header [nomeUsuario]="'Admin'"></app-header>

<main class="p-4 max-w-xl mx-auto pt-8">
  <h2 class="text-xl font-bold mb-4">Gestão de Setores</h2>

  <mat-form-field appearance="outline" class="w-full mb-4">
    <mat-label>Buscar membro</mat-label>
    <input matInput (keyup)="aplicarFiltro($event)" />
  </mat-form-field>

  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
    <table mat-table [dataSource]="dataSource" class="w-full">
      <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let row">{{ row.nome }}</td>
      </ng-container>

      <ng-container matColumnDef="setor">
        <th mat-header-cell *matHeaderCellDef>Setor</th>
        <td mat-cell *matCellDef="let row">
          <span class="text-xs font-bold text-sky-600">{{
            row.setor_responsavel || 'Sem setor'
          }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="acoes">
        <th mat-header-cell *matHeaderCellDef>Delegar</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" (click)="abrirEdicao(row)">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator [pageSize]="10"></mat-paginator>
  </div>
</main>
