<div class="min-h-screen bg-slate-50 text-slate-800 pb-24">
  <app-header [nomeUsuario]="nomeUsuario()" [fotoUsuario]="fotoUsuario()"> </app-header>

  <main class="p-4 max-w-xl mx-auto pt-8">
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-slate-800">Painel Administrativo</h1>
      <p class="text-slate-500 text-sm">Gerencie sua comunidade com eficiência.</p>
    </div>

    <div class="space-y-4">
      <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
        <div class="flex items-center mb-4">
          <div class="p-2 bg-sky-100 text-sky-600 rounded-xl mr-3">
            <mat-icon>group</mat-icon>
          </div>
          <h2 class="font-bold">Delegar Setores</h2>
        </div>
        <button
          mat-stroked-button
          color="primary"
          class="w-full rounded-xl"
          (click)="abrirModalLideranca()"
        >
          Selecionar Lider do Setor
        </button>
      </div>

      <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
        <div class="flex items-center mb-4">
          <div class="p-2 bg-amber-100 text-amber-600 rounded-xl mr-3">
            <mat-icon>campaign</mat-icon>
          </div>
          <h2 class="font-bold">Fazer Aviso</h2>
        </div>
        <textarea
          class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 mb-3 text-sm focus:ring-2 focus:ring-amber-500 outline-none"
          rows="3"
          placeholder="Digite o comunicado..."
        ></textarea>
        <button mat-flat-button color="primary" class="w-full rounded-xl">Publicar Aviso</button>
      </div>

      <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
        <div class="flex items-center mb-4">
          <div class="p-2 bg-emerald-100 text-emerald-600 rounded-xl mr-3">
            <mat-icon>event_available</mat-icon>
          </div>
          <h2 class="font-bold">Montar Escala</h2>
        </div>
        <button mat-stroked-button color="accent" class="w-full rounded-xl">Acessar Escalas</button>
      </div>
    </div>
  </main>

  <app-footer></app-footer>
</div>
